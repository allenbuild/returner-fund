  <text class="body"><tspan x="92" y="178">We're building the human-in-the-loop system for robots. It's</tspan><tspan x="92" y="216">inevitable that robots will make mistakes during deployment- what</tspan><tspan x="92" y="254">matters is how you respond.Sentinel makes it possible to intervene in</tspan><tspan x="92" y="292">real-time. No lost ROI. No safety issues.Book a demo:</tspan><tspan x="92" y="330">https://t.co/FoxJlneyRg pic.twitter.com/tHXThW9UpL</tspan></text>
